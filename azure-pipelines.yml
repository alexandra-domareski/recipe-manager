trigger:
  - main

pool:
  vmImage: "ubuntu-latest"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: "Install Node.js"

  - script: |
      npm install
    displayName: "Install Dependencies"

  - script: |
      npm run build
    displayName: "Build Project"

  - script: |
      npm test -- --watchAll=false
    displayName: "Run Unit Tests"
